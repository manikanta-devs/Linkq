<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkLock - Smart Controlled Sharing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }
    
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.6s ease-out;
      width: 100%;
      max-width: 900px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .tagline {
      color: #94a3b8;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.5px;
    }
    
    .nav-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    
    .nav-btn {
      padding: 0.5rem 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .nav-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-color: transparent;
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      animation: fadeInUp 0.6s ease-out;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .section {
      margin-bottom: 2rem;
    }
    
    .section:last-child {
      margin-bottom: 0;
    }
    
    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }
    
    textarea, input[type="text"], input[type="password"], input[type="file"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    
    input[type="file"] {
      padding: 0.75rem;
      cursor: pointer;
    }
    
    textarea:focus, input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.05);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    select {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
    }
    
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      cursor: pointer;
    }
    
    .checkbox-wrapper:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border: none;
      border-radius: 12px;
      padding: 1rem 2rem;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(59, 130, 246, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }
    
    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      width: auto;
    }
    
    .buttons-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .qr-canvas {
      border-radius: 12px;
      background: white;
      padding: 1rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      display: block;
      width: fit-content;
      margin: 0 auto;
    }
    
    .qr-canvas img,
    .qr-canvas canvas {
      display: block;
    }
    
    .share-url {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    
    .share-url-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #3b82f6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .text-content {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }
    
    .image-preview {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 1rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    
    .stat-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #3b82f6;
    }
    
    .dashboard-grid {
      display: grid;
      gap: 1rem;
    }
    
    .share-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .share-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }
    
    .share-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #3b82f6;
    }
    
    .share-actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .hidden {
      display: none;
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 640px) {
      h1 { font-size: 2rem; }
      .card { padding: 1.5rem; }
      .buttons-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🔒</div>
        <h1>LinkLock</h1>
      </div>
      <p class="tagline">Smart Controlled Sharing</p>
      
      <div class="nav-buttons" id="navButtons">
        <button class="nav-btn active" onclick="app.setMode('upload')">📝 New Share</button>
        <button class="nav-btn" onclick="app.setMode('dashboard')">👁️ Dashboard</button>
      </div>
    </div>
    
    <div class="container" id="container"></div>
  </div>

  <script src="./qrcode.min.js"></script>
  <script>
    const createStorageAdapter = () => {
      if (window.storage && typeof window.storage.get === 'function') {
        return window.storage;
      }
      
      const prefix = 'linklock:';
      return {
        async get(key) {
          try {
            const value = window.localStorage.getItem(prefix + key);
            return { value };
          } catch (error) {
            console.warn('Local storage read failed:', error);
            return { value: null };
          }
        },
        async set(key, value) {
          window.localStorage.setItem(prefix + key, value);
          return true;
        },
        async delete(key) {
          window.localStorage.removeItem(prefix + key);
          return true;
        }
      };
    };
    
    const app = {
      mode: 'upload',
      currentId: '',
      fileData: null,
      fileReadPromise: null,
      allShares: [],
      storage: createStorageAdapter(),
      
      init() {
        // Check URL hash
        const hash = window.location.hash;
        if (hash.startsWith('#view/')) {
          this.currentId = hash.replace('#view/', '');
          this.setMode('view');
        } else if (hash === '#dashboard') {
          this.setMode('dashboard');
        } else {
          this.render();
        }
      },
      
      setMode(mode) {
        this.mode = mode;
        if (mode === 'dashboard') {
          this.loadDashboard();
        }
        this.render();
      },
      
      async loadDashboard() {
        try {
          const result = await this.storage.get('owner_list');
          if (!result || !result.value) {
            this.allShares = [];
            return;
          }
          
          const ownerList = JSON.parse(result.value);
          const shares = [];
          
          for (const id of ownerList) {
            const shareResult = await this.storage.get(id);
            if (shareResult && shareResult.value) {
              shares.push(JSON.parse(shareResult.value));
            }
          }
          
          shares.sort((a, b) => b.stats.createdAt - a.stats.createdAt);
          this.allShares = shares;
        } catch (error) {
          this.allShares = [];
        }
      },
      
      render() {
        const container = document.getElementById('container');
        const navButtons = document.getElementById('navButtons');
        
        // Update nav buttons
        if (this.mode === 'view') {
          navButtons.classList.add('hidden');
        } else {
          navButtons.classList.remove('hidden');
          document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
          });
          if (this.mode === 'upload') {
            document.querySelectorAll('.nav-btn')[0].classList.add('active');
          } else if (this.mode === 'dashboard') {
            document.querySelectorAll('.nav-btn')[1].classList.add('active');
          }
        }
        
        // Render content
        if (this.mode === 'upload') {
          container.innerHTML = this.renderUpload();
        } else if (this.mode === 'share') {
          container.innerHTML = this.renderShare();
          this.drawQR();
        } else if (this.mode === 'view') {
          container.innerHTML = this.renderView();
        } else if (this.mode === 'dashboard') {
          container.innerHTML = this.renderDashboard();
        }
      },
      
      renderUpload() {
        return `
          <div class="card">
            <div class="section">
              <div class="section-title">Content</div>
              <textarea id="textContent" placeholder="Paste your text, code, or notes here..."></textarea>
            </div>
            
            <div class="section">
              <div class="section-title">Attach File (Optional)</div>
              <input type="file" id="fileInput" onchange="app.handleFileUpload(event)">
              <small style="color: #94a3b8; font-size: 0.8rem; display: block; margin-top: 0.5rem;">
                ${this.fileData ? `Selected: ${this.fileData.name}` : this.fileReadPromise ? 'Reading file...' : 'No file selected'}
              </small>
            </div>
            
            <div class="section">
              <div class="section-title">Access Rules</div>
              <div style="display: grid; gap: 1rem;">
                <div>
                  <label style="font-size: 0.9rem; color: #cbd5e1; display: block; margin-bottom: 0.5rem;">Maximum Views</label>
                  <select id="maxViews">
                    <option value="1">1 view (self-destruct)</option>
                    <option value="3">3 views</option>
                    <option value="5">5 views</option>
                    <option value="unlimited" selected>Unlimited</option>
                  </select>
                </div>
                
                <div>
                  <label style="font-size: 0.9rem; color: #cbd5e1; display: block; margin-bottom: 0.5rem;">Expires After</label>
                  <select id="expiryHours">
                    <option value="1">1 hour</option>
                    <option value="6">6 hours</option>
                    <option value="24" selected>24 hours</option>
                    <option value="168">7 days</option>
                    <option value="never">Never</option>
                  </select>
                </div>
                
                <label class="checkbox-wrapper">
                  <input type="checkbox" id="downloadAllowed" checked>
                  <span style="font-size: 0.9rem; color: #cbd5e1;">Allow downloads</span>
                </label>
                
                <label class="checkbox-wrapper">
                  <input type="checkbox" id="passwordProtected" onchange="app.togglePassword()">
                  <span style="font-size: 0.9rem; color: #cbd5e1;">🔒 Password protect</span>
                </label>
                
                <div id="passwordField" class="hidden">
                  <label style="font-size: 0.9rem; color: #cbd5e1; display: block; margin-bottom: 0.5rem;">Set Password</label>
                  <input type="password" id="password" placeholder="Enter password...">
                </div>
                
                <label class="checkbox-wrapper">
                  <input type="checkbox" id="useCustomSlug" onchange="app.toggleCustomSlug()">
                  <span style="font-size: 0.9rem; color: #cbd5e1;">Custom URL slug</span>
                </label>
                
                <div id="customSlugField" class="hidden">
                  <label style="font-size: 0.9rem; color: #cbd5e1; display: block; margin-bottom: 0.5rem;">Custom Slug (3-30 chars)</label>
                  <input type="text" id="customSlug" placeholder="my-custom-link">
                  <small style="color: #94a3b8; font-size: 0.8rem;">Letters, numbers, hyphens, underscores only</small>
                </div>
              </div>
            </div>
            
            <button class="btn" onclick="app.createShare()">Generate Share Link</button>
          </div>
        `;
      },
      
      renderShare() {
        const url = this.shareUrl;
        return `
          <div class="card">
            <div id="qrCanvas" class="qr-canvas"></div>
            
            <div class="share-url">
              <span class="share-url-text">${url}</span>
              <button class="btn btn-small" onclick="app.copyUrl()">📋 Copy</button>
            </div>
            
            <div class="buttons-row">
              <button class="btn btn-secondary" onclick="app.downloadQR()">⬇️ QR</button>
              <button class="btn btn-secondary" onclick="app.shareEmail()">✉️ Email</button>
              <button class="btn btn-secondary" onclick="app.nativeShare()">📱 Share</button>
              <button class="btn" onclick="app.reset()">📝 New</button>
            </div>
          </div>
        `;
      },
      
      renderView() {
        return `
          <div class="card">
            <div style="text-align: center; padding: 2rem;">
              <div style="font-size: 2rem; margin-bottom: 1rem;">⏳</div>
              <div style="color: #94a3b8;">Loading content...</div>
            </div>
          </div>
        `;
      },
      
      renderDashboard() {
        if (this.allShares.length === 0) {
          return `
            <div class="card">
              <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">👁️ Your Shares</h2>
              <div style="text-align: center; padding: 4rem 2rem;">
                <div style="font-size: 4rem; margin-bottom: 1rem; opacity: 0.5;">📦</div>
                <div style="font-size: 1.5rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.5rem;">No shares yet</div>
                <div style="color: #64748b; margin-bottom: 2rem;">Create your first smart share to get started</div>
                <button class="btn" style="max-width: 300px; margin: 0 auto;" onclick="app.setMode('upload')">📝 Create Share</button>
              </div>
            </div>
          `;
        }
        
        const sharesHtml = this.allShares.map(share => {
          const url = window.location.origin + window.location.pathname + '#view/' + share.id;
          const isExpired = share.rules.expiryTime && Date.now() > share.rules.expiryTime;
          const isLimitReached = share.rules.maxViews !== -1 && share.stats.viewCount >= share.rules.maxViews;
          
          return `
            <div class="share-card">
              <div class="share-header">
                <div>
                  <div class="share-id">${share.id}${share.rules.passwordProtected ? ' 🔒' : ''}</div>
                  <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem;">
                    ${new Date(share.stats.createdAt).toLocaleString()}
                  </div>
                </div>
                <div class="share-actions">
                  <button class="btn btn-small btn-secondary" onclick="app.copyShareUrl('${url}')">📋</button>
                  <button class="btn btn-small btn-danger" onclick="app.deleteShare('${share.id}')">🗑️</button>
                </div>
              </div>
              
              <div style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                ${share.content.text ? share.content.text.substring(0, 100) : share.content.file ? share.content.file.name : ''}
              </div>
              
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                <div>
                  <div style="font-size: 0.8rem; color: #94a3b8;">Views</div>
                  <div style="color: ${isLimitReached ? '#ef4444' : '#3b82f6'}; font-weight: 600;">
                    ${share.stats.viewCount}${share.rules.maxViews !== -1 ? ' / ' + share.rules.maxViews : ''}
                  </div>
                </div>
                <div>
                  <div style="font-size: 0.8rem; color: #94a3b8;">Expires</div>
                  <div style="color: ${isExpired ? '#ef4444' : '#3b82f6'}; font-weight: 600;">
                    ${share.rules.expiryTime ? (isExpired ? 'Expired' : 'Soon') : 'Never'}
                  </div>
                </div>
                <div>
                  <div style="font-size: 0.8rem; color: #94a3b8;">Download</div>
                  <div style="color: #3b82f6; font-weight: 600;">
                    ${share.rules.downloadAllowed ? '✓ Yes' : '✗ No'}
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        return `
          <div class="card">
            <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">👁️ Your Shares</h2>
            <div class="dashboard-grid">${sharesHtml}</div>
          </div>
        `;
      },
      
      togglePassword() {
        const field = document.getElementById('passwordField');
        const checked = document.getElementById('passwordProtected').checked;
        field.classList.toggle('hidden', !checked);
      },
      
      toggleCustomSlug() {
        const field = document.getElementById('customSlugField');
        const checked = document.getElementById('useCustomSlug').checked;
        field.classList.toggle('hidden', !checked);
      },
      
      handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) {
          this.fileData = null;
          this.fileReadPromise = null;
          this.render();
          return;
        }
        
        const reader = new FileReader();
        this.fileReadPromise = new Promise((resolve, reject) => {
          reader.onload = (e) => {
            this.fileData = {
              name: file.name,
              type: file.type,
              size: file.size,
              data: e.target.result
            };
            this.fileReadPromise = null;
            resolve();
          };
          reader.onerror = () => {
            this.fileData = null;
            this.fileReadPromise = null;
            reject(new Error('File read failed'));
          };
        });
        reader.readAsDataURL(file);
        this.render();
      },
      
      async createShare() {
        if (this.fileReadPromise) {
          try {
            await this.fileReadPromise;
          } catch (error) {
            alert('Failed to read the selected file. Please try again.');
            return;
          }
        }
        
        const textContent = document.getElementById('textContent').value;
        
        if (!textContent && !this.fileData) {
          alert('Please add some content to share');
          return;
        }
        
        const maxViews = document.getElementById('maxViews').value;
        const expiryHours = document.getElementById('expiryHours').value;
        const downloadAllowed = document.getElementById('downloadAllowed').checked;
        const passwordProtected = document.getElementById('passwordProtected').checked;
        const password = passwordProtected ? document.getElementById('password').value : '';
        const useCustomSlug = document.getElementById('useCustomSlug').checked;
        const customSlug = useCustomSlug ? document.getElementById('customSlug').value : '';
        
        if (passwordProtected && !password) {
          alert('Please set a password');
          return;
        }
        
        let id;
        if (useCustomSlug && customSlug) {
          if (!/^[a-zA-Z0-9-_]{3,30}$/.test(customSlug)) {
            alert('Invalid slug. Use 3-30 characters: letters, numbers, hyphens, underscores');
            return;
          }
          
          const existing = await this.storage.get(customSlug);
          if (existing && existing.value) {
            alert('This slug is already taken');
            return;
          }
          
          id = customSlug;
        } else {
          id = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }
        
        const now = Date.now();
        const expiryTime = expiryHours === 'never' ? null : now + (parseInt(expiryHours) * 60 * 60 * 1000);
        
        const contentObj = {
          id,
          content: {
            text: textContent,
            file: this.fileData
          },
          rules: {
            maxViews: maxViews === 'unlimited' ? -1 : parseInt(maxViews),
            expiryTime,
            downloadAllowed,
            passwordProtected,
            passwordHash: passwordProtected ? this.hashPassword(password) : null
          },
          stats: {
            viewCount: 0,
            createdAt: now,
            lastAccessed: null
          }
        };
        
        await this.storage.set(id, JSON.stringify(contentObj));
        
        const ownerListResult = await this.storage.get('owner_list');
        const ownerList = ownerListResult && ownerListResult.value ? JSON.parse(ownerListResult.value) : [];
        ownerList.push(id);
        await this.storage.set('owner_list', JSON.stringify(ownerList));
        
        this.shareUrl = window.location.origin + window.location.pathname + '#view/' + id;
        this.currentId = id;
        this.mode = 'share';
        this.render();
      },
      
      drawQR() {
        const qrContainer = document.getElementById('qrCanvas');
        if (!qrContainer || !this.shareUrl) return;
        
        qrContainer.innerHTML = '';
        
        if (window.QRCode) {
          new window.QRCode(qrContainer, {
            text: this.shareUrl,
            width: 220,
            height: 220,
            colorDark: '#000000',
            colorLight: '#FFFFFF',
            correctLevel: window.QRCode.CorrectLevel.M
          });
          return;
        }
        
        qrContainer.innerHTML = '<div style="color:#000; font-size:12px; font-family:monospace; text-align:center; width:220px; height:220px; display:flex; align-items:center; justify-content:center;">Unable to generate QR code. Please refresh and try again.</div>';
      },
      
      async nativeShare() {
        if (!navigator.share) {
          alert('Native sharing is not supported on this browser.');
          return;
        }
        
        try {
          await navigator.share({
            title: 'LinkLock Share',
            text: 'Access my LinkLock share:',
            url: this.shareUrl
          });
        } catch (error) {
          if (error && error.name !== 'AbortError') {
            alert('Unable to open native share dialog. Please use Copy URL instead.');
          }
        }
      },
      
      downloadQR() {
        const qrContainer = document.getElementById('qrCanvas');
        const canvas = qrContainer ? qrContainer.querySelector('canvas') : null;
        const image = qrContainer ? qrContainer.querySelector('img') : null;
        const url = canvas ? canvas.toDataURL('image/png') : image ? image.src : null;
        if (!url) {
          alert('QR code is not ready yet.');
          return;
        }
        const a = document.createElement('a');
        a.href = url;
        a.download = 'linklock-' + this.currentId + '.png';
        a.click();
      },
      
      copyUrl() {
        navigator.clipboard.writeText(this.shareUrl);
        alert('Link copied!');
      },
      
      copyShareUrl(url) {
        navigator.clipboard.writeText(url);
        alert('Link copied!');
      },
      
      shareEmail() {
        const subject = encodeURIComponent('Shared content via LinkLock');
        const body = encodeURIComponent(`I've shared something with you using LinkLock:\n\n${this.shareUrl}\n\nThis link has controlled access and may expire.`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
      },
      
      async deleteShare(id) {
        if (!confirm('Delete this share?')) return;
        
        await this.storage.delete(id);
        
        const ownerListResult = await this.storage.get('owner_list');
        if (ownerListResult && ownerListResult.value) {
          let ownerList = JSON.parse(ownerListResult.value);
          ownerList = ownerList.filter(shareId => shareId !== id);
          await this.storage.set('owner_list', JSON.stringify(ownerList));
        }
        
        await this.loadDashboard();
        this.render();
      },
      
      reset() {
        this.fileData = null;
        this.fileReadPromise = null;
        this.mode = 'upload';
        window.location.hash = '';
        this.render();
      },
      
      hashPassword(password) {
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
          const char = password.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        return hash.toString(36);
      }
    };
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      app.init();
    });
    
    // Handle hash changes
    window.addEventListener('hashchange', () => {
      app.init();
    });
  </script>
</body>
</html>
