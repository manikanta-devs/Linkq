<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkLock - Smart Controlled Sharing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }
    
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.6s ease-out;
      width: 100%;
      max-width: 900px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .tagline {
      color: #94a3b8;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.5px;
    }
    
    .nav-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    
    .nav-btn {
      padding: 0.5rem 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .nav-btn.active {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-color: transparent;
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      animation: fadeInUp 0.6s ease-out;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .section {
      margin-bottom: 2rem;
    }
    
    .section:last-child {
      margin-bottom: 0;
    }
    
    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
    }
    
    textarea, input[type="text"], input[type="password"], input[type="file"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    
    input[type="file"] {
      padding: 0.75rem;
      cursor: pointer;
    }
    
    textarea:focus, input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.05);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    select {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #e2e8f0;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
    }
    
    select option {
      background: #1e293b;
      color: #e2e8f0;
    }
    
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      cursor: pointer;
    }
    
    .checkbox-wrapper:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border: none;
      border-radius: 12px;
      padding: 1rem 2rem;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(59, 130, 246, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }
    
    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      width: auto;
    }
    
    .buttons-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .qr-canvas {
      border-radius: 12px;
      background: white;
      padding: 1rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      display: block;
      width: fit-content;
      margin: 0 auto;
    }
    
    .qr-canvas img,
    .qr-canvas canvas {
      display: block;
    }
    
    .qr-fallback-message {
      color: #000;
      font-size: 12px;
      font-family: monospace;
      text-align: center;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .share-url {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    
    .share-url-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #3b82f6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .text-content {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }
    
    .image-preview {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 1rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    
    .stat-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #3b82f6;
    }
    
    .dashboard-grid {
      display: grid;
      gap: 1rem;
    }
    
    .share-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .share-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }
    
    .share-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #3b82f6;
    }
    
    .share-actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .hidden {
      display: none;
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      margin: 0 auto;

    .auth-title {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 2rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .auth-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      color: #fca5a5;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }

    .auth-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      color: #86efac;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }

    .auth-switch {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .auth-switch a {
      color: #3b82f6;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      font-size: 0.85rem;
      color: #e2e8f0;
    }

    .user-badge-name {
      font-weight: 600;
      color: #3b82f6;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 900px;
      margin-top: 1rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    @media (max-width: 640px) {
      h1 { font-size: 2rem; }
      .card { padding: 1.5rem; }
      .buttons-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .auth-card { padding: 1.5rem; }
      .header-row { justify-content: center; }
    }

<body>
  <div class="app" id="app">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🔒</div>
        <h1>LinkLock</h1>
      </div>
      <p class="tagline">Smart Controlled Sharing</p>
      
      <div class="header-row" id="headerRow">
        <div class="nav-buttons" id="navButtons">
          <button class="nav-btn active" onclick="app.setMode('upload')">📝 New Share</button>
          <button class="nav-btn" onclick="app.setMode('dashboard')">👁️ Dashboard</button>
        </div>
        <div id="userBadgeArea"></div>
      </div>
    </div>
    
    <div class="container" id="container"></div>
  </div>

  <!-- Bundled free QR library (MIT): davidshimjs/qrcodejs qrcode.min.js @ 04f46c6a0708418cb7b96fc563eacae0fbf77674 -->
  <script src="./qrcode.min.js"></script>
  <script>
    const createStorageAdapter = () => {
      if (window.storage && typeof window.storage.get === 'function') {
        return window.storage;
      }
      
      const prefix = 'linklock:';
      return {
        async get(key) {
          try {
            const value = window.localStorage.getItem(prefix + key);
            return { value };
          } catch (error) {
            console.warn('Local storage read failed for key:', key, error);
            return { value: null };
          }
        },
        async set(key, value) {
          try {
            window.localStorage.setItem(prefix + key, value);
            return true;
          } catch (error) {
            console.warn('Local storage write failed for key:', key, error);
            return false;
          }
        },
        async delete(key) {
          window.localStorage.removeItem(prefix + key);
          return true;
        }
      };
    };
    
    const app = {
      mode: 'upload',
      currentId: '',
      currentEmbeddedShare: null,
      fileData: null,
      fileReadPromise: null,
      allShares: [],
      storage: createStorageAdapter(),
      // Keep payload embedded only while URL size remains practical for common scanners/browsers.
      maxEmbeddedPayloadLength: 2200,

      /* ── Auth helpers ── */
      _currentUser: null,

      getSession() {
        try {
          const raw = sessionStorage.getItem('ll_session');
          return raw ? JSON.parse(raw) : null;
        } catch (e) { return null; }
      },

      saveSession(username) {
        try { sessionStorage.setItem('ll_session', JSON.stringify({ username })); } catch (e) {}
        this._currentUser = username;
      },

      clearSession() {
        try { sessionStorage.removeItem('ll_session'); } catch (e) {}
        this._currentUser = null;
      },

      /* Storage key scoped to the current user so shares are isolated */
      userKey(key) {
        return this._currentUser ? `u:${this._currentUser}:${key}` : key;
      },

      hashPassword(password) {
        let hash = 5381;
        for (let i = 0; i < password.length; i++) {
          hash = ((hash << 5) + hash) ^ password.charCodeAt(i);
          hash = hash >>> 0;
        }
        return hash.toString(36);
      },

      async register() {
        const username = (document.getElementById('regUsername')?.value || '').trim().toLowerCase();
        const password = document.getElementById('regPassword')?.value || '';
        const confirm  = document.getElementById('regConfirm')?.value  || '';
        const errorEl  = document.getElementById('authError');
        const successEl = document.getElementById('authSuccess');
        if (errorEl)   errorEl.style.display   = 'none';
        if (successEl) successEl.style.display = 'none';

        if (!username || username.length < 3) {
          if (errorEl) { errorEl.textContent = 'Username must be at least 3 characters.'; errorEl.style.display = 'block'; }
          return;
        }
        if (!/^[a-z0-9_]{3,20}$/.test(username)) {
          if (errorEl) { errorEl.textContent = 'Username: 3-20 chars, letters, numbers, underscores only.'; errorEl.style.display = 'block'; }
          return;
        }
        if (password.length < 6) {
          if (errorEl) { errorEl.textContent = 'Password must be at least 6 characters.'; errorEl.style.display = 'block'; }
          return;
        }
        if (password !== confirm) {
          if (errorEl) { errorEl.textContent = 'Passwords do not match.'; errorEl.style.display = 'block'; }
          return;
        }

        const existingRaw = localStorage.getItem(`linklock:account:${username}`);
        if (existingRaw) {
          if (errorEl) { errorEl.textContent = 'Username is already taken. Please choose another.'; errorEl.style.display = 'block'; }
          return;
        }

        const account = { username, passwordHash: this.hashPassword(password), createdAt: Date.now() };
        try {
          localStorage.setItem(`linklock:account:${username}`, JSON.stringify(account));
        } catch (e) {
          if (errorEl) { errorEl.textContent = 'Registration failed — storage error.'; errorEl.style.display = 'block'; }
          return;
        }

        if (successEl) { successEl.textContent = '🎉 Account created! Redirecting to login…'; successEl.style.display = 'block'; }
        setTimeout(() => this.setMode('login'), 1200);
      },

      async login() {
        const username = (document.getElementById('loginUsername')?.value || '').trim().toLowerCase();
        const password = document.getElementById('loginPassword')?.value || '';
        const errorEl  = document.getElementById('authError');
        if (errorEl) errorEl.style.display = 'none';

        if (!username || !password) {
          if (errorEl) { errorEl.textContent = 'Please enter your username and password.'; errorEl.style.display = 'block'; }
          return;
        }

        const raw = localStorage.getItem(`linklock:account:${username}`);
        if (!raw) {
          if (errorEl) { errorEl.textContent = 'Incorrect username or password.'; errorEl.style.display = 'block'; }
          return;
        }

        let account;
        try { account = JSON.parse(raw); } catch (e) {
          if (errorEl) { errorEl.textContent = 'Account data corrupted. Please register again.'; errorEl.style.display = 'block'; }
          return;
        }

        if (account.passwordHash !== this.hashPassword(password)) {
          if (errorEl) { errorEl.textContent = 'Incorrect username or password.'; errorEl.style.display = 'block'; }
          return;
        }

        this.saveSession(username);
        this.updateUserBadge();
        this.setMode('upload');
      },

      logout() {
        this.clearSession();
        this.updateUserBadge();
        this.setMode('login');
      },

      updateUserBadge() {
        const badgeArea  = document.getElementById('userBadgeArea');
        const headerRow  = document.getElementById('headerRow');
        const navButtons = document.getElementById('navButtons');
        if (!badgeArea) return;
        if (this._currentUser) {
          badgeArea.innerHTML = `
            <div class="user-badge">
              👤 <span class="user-badge-name">${this.escapeHtml(this._currentUser)}</span>
              <button class="btn btn-small btn-secondary" style="padding:0.3rem 0.75rem;font-size:0.8rem;" onclick="app.logout()">Sign Out</button>
            </div>
          `;
          if (headerRow) headerRow.style.display = '';
          if (navButtons) navButtons.style.display = '';
        } else {
          badgeArea.innerHTML = '';
          if (navButtons) navButtons.style.display = 'none';
        }
      },

      init() {
        const session = this.getSession();
        if (session && session.username) {
          this._currentUser = session.username;
        }
        this.updateUserBadge();

        const hash = window.location.hash;
        const viewRoute = this.parseViewHash(hash);
        if (viewRoute) {
          this.currentId = viewRoute.id;
          this.currentEmbeddedShare = viewRoute.embeddedShare;
          this.setMode('view');
        } else if (hash === '#dashboard') {
          this.currentEmbeddedShare = null;
          if (!this._currentUser) { this.setMode('login'); return; }
          this.setMode('dashboard');
        } else {
          this.currentEmbeddedShare = null;
          if (!this._currentUser) { this.setMode('login'); return; }
          this.render();
        }
      },

      parseViewHash(hash) {
        if (!hash || !hash.startsWith('#view/')) return null;
        const raw = hash.slice(6);
        const queryStart = raw.indexOf('?');
        const rawId = queryStart === -1 ? raw : raw.slice(0, queryStart);
        const id = decodeURIComponent(rawId || '').trim();
        if (!id) return null;
        let embeddedShare = this.decodeSharePayload(new URLSearchParams(window.location.search).get('d'));
        if (queryStart !== -1) {
          const params = new URLSearchParams(raw.slice(queryStart + 1));
          if (!embeddedShare) embeddedShare = this.decodeSharePayload(params.get('d'));
        }
        return { id, embeddedShare };
      },

      decodeSharePayload(payload) {
        if (!payload) return null;
        try {
          const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
          const padding = (4 - (normalized.length % 4)) % 4;
          const base64 = normalized + '='.repeat(padding);
          const binary = atob(base64);
          const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
          const json = new TextDecoder().decode(bytes);
          const parsed = JSON.parse(json);
          return parsed && parsed.id && parsed.content && parsed.rules ? parsed : null;
        } catch (error) {
          return null;
        }
      },

      encodeSharePayload(share) {
        try {
          const json = JSON.stringify(share);
          const bytes = new TextEncoder().encode(json);
          let binary = '';
          for (const byte of bytes) binary += String.fromCharCode(byte);
          return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
        } catch (error) {
          return null;
        }
      },

      buildShareUrl(id, share) {
        const basePath = window.location.origin + window.location.pathname;
        const hashPath = '#view/' + encodeURIComponent(id);
        const payload = this.encodeSharePayload(share);
        if (!payload || payload.length > this.maxEmbeddedPayloadLength) return basePath + hashPath;
        return basePath + '?d=' + payload + hashPath;
      },
      
      setMode(mode) {
        this.mode = mode;
        if (mode === 'dashboard') {
          if (!this._currentUser) { this.mode = 'login'; this.render(); return; }
          this.loadDashboard();
        }
        if ((mode === 'upload' || mode === 'share') && !this._currentUser) {
          this.mode = 'login';
        }
        this.render();
      },
      
      async loadDashboard() {
        try {
          const result = await this.storage.get(this.userKey('owner_list'));
          if (!result || !result.value) {
            this.allShares = [];
            this.render();
            return;
          }
          
          const ownerList = JSON.parse(result.value);
          const shares = [];
          
          for (const id of ownerList) {
            const shareResult = await this.storage.get(id);
            if (shareResult && shareResult.value) {
              shares.push(JSON.parse(shareResult.value));
            }
          }
          
          shares.sort((a, b) => b.stats.createdAt - a.stats.createdAt);
          this.allShares = shares;
        } catch (error) {
          this.allShares = [];
        }
        this.render();
      },
      
      render() {
        const container = document.getElementById('container');
        const navButtons = document.getElementById('navButtons');
        
        // Update nav buttons visibility
        if (this.mode === 'view' || this.mode === 'login' || this.mode === 'register') {
          if (navButtons) navButtons.classList.add('hidden');
        } else {
          if (navButtons) navButtons.classList.remove('hidden');
          document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
          });
          if (this.mode === 'upload') {
            document.querySelectorAll('.nav-btn')[0].classList.add('active');
          } else if (this.mode === 'dashboard') {
            document.querySelectorAll('.nav-btn')[1].classList.add('active');
          }
        }
        
        // Render content
        if (this.mode === 'login') {
          container.innerHTML = this.renderLogin();
        } else if (this.mode === 'register') {
          container.innerHTML = this.renderRegister();
        } else if (this.mode === 'upload') {
          container.innerHTML = this.renderUpload();
        } else if (this.mode === 'share') {
          container.innerHTML = this.renderShare();
          this.drawQR();
        } else if (this.mode === 'view') {
          container.innerHTML = this.renderView();
          this.loadView();
        } else if (this.mode === 'dashboard') {
          container.innerHTML = this.renderDashboard();
        }
      },

        return `

              <button class="btn" onclick="app.reset()">📝 New</button>
            </div>

      },
      
      renderView() {
        return `
          <div class="card">
            <div style="text-align: center; padding: 2rem;">
              <div style="font-size: 2rem; margin-bottom: 1rem;">⏳</div>
              <div style="color: #94a3b8;">Loading content...</div>
            </div>
          </div>
        `;
      },
      
      async loadView() {
        const id = this.currentId;
        const container = document.getElementById('container');
        if (!container || !id) {
          if (container) container.innerHTML = this.renderViewError('🔍', 'Not Found', 'No share ID provided.');
          return;
        }
        
        let share = this.currentEmbeddedShare && this.currentEmbeddedShare.id === id
          ? JSON.parse(JSON.stringify(this.currentEmbeddedShare))
          : null;
        try {
          const result = await this.storage.get(id);
          if (result && result.value) {
            share = JSON.parse(result.value);
          } else if (!share) {
            container.innerHTML = this.renderViewError('🔍', 'Not Found', 'This share does not exist or has already been deleted.');
            return;
          }
        } catch (e) {
          if (!share) {
            container.innerHTML = this.renderViewError('⚠️', 'Error', 'Failed to load share data. Please try again.');
            return;
          }
        }

        if (!share.stats) {
          share.stats = { viewCount: 0, createdAt: Date.now(), lastAccessed: null };
        }
        
        // Check expiry
        if (share.rules.expiryTime && Date.now() > share.rules.expiryTime) {
          await this.storage.delete(id);
          container.innerHTML = this.renderViewError('⏰', 'Link Expired', 'This share has expired and is no longer available.');
          return;
        }
        
        // Check view limit
        if (share.rules.maxViews !== -1 && share.stats.viewCount >= share.rules.maxViews) {
          container.innerHTML = this.renderViewError('🚫', 'View Limit Reached', 'This share has reached its maximum number of views.');
          return;
        }
        
        // Password check
        if (share.rules.passwordProtected) {
          this._pendingShare = share;
          container.innerHTML = this.renderPasswordForm();
          const input = document.getElementById('viewPassword');
          if (input) input.focus();
          return;
        }
        
        await this.displayShare(share, container);
      },
      
      renderViewError(icon, title, message) {
        return `
          <div class="card">
            <div style="text-align: center; padding: 3rem 2rem;">
              <div style="font-size: 3rem; margin-bottom: 1rem;">${icon}</div>
              <div style="font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem;">${title}</div>
              <div style="color: #94a3b8; margin-bottom: 2rem;">${message}</div>
              <button class="btn" style="max-width: 220px; margin: 0 auto;" onclick="window.location.hash=''">🏠 Go Home</button>
            </div>
          </div>
        `;
      },
      
      renderPasswordForm() {
        return `
          <div class="card">
            <div style="text-align: center; padding: 1rem 0 2rem;">
              <div style="font-size: 3rem; margin-bottom: 1rem;">🔒</div>
              <div style="font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem;">Password Protected</div>
              <div style="color: #94a3b8; margin-bottom: 2rem;">Enter the password to access this share</div>
              <div style="max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem;">
                <input type="password" id="viewPassword" placeholder="Enter password..." onkeydown="if(event.key==='Enter')app.verifyAndView()">
                <div id="passwordError" style="color: #ef4444; font-size: 0.85rem; display: none;">❌ Incorrect password. Please try again.</div>
                <button class="btn" onclick="app.verifyAndView()">🔓 Unlock</button>
                <button class="btn btn-secondary" onclick="window.location.hash=''">Cancel</button>
              </div>
            </div>
          </div>
        `;
      },
      
      async verifyAndView() {
        const share = this._pendingShare;
        if (!share) return;
        const input = document.getElementById('viewPassword');
        if (!input) return;
        const entered = input.value;
        const errorEl = document.getElementById('passwordError');
        
        if (this.hashPassword(entered) !== share.rules.passwordHash) {
          if (errorEl) errorEl.style.display = 'block';
          input.value = '';
          input.focus();
          return;
        }
        
        if (errorEl) errorEl.style.display = 'none';
        this._pendingShare = null;
        const container = document.getElementById('container');
        await this.displayShare(share, container);
      },
      
      async displayShare(share, container) {
        // Increment view count
        share.stats.viewCount++;
        share.stats.lastAccessed = Date.now();
        
        const willSelfDestruct = share.rules.maxViews !== -1 && share.stats.viewCount >= share.rules.maxViews;
        
        if (willSelfDestruct) {
          await this.storage.delete(share.id);
          const ownerListResult = await this.storage.get(this.userKey('owner_list'));
          if (ownerListResult && ownerListResult.value) {
            let ownerList = JSON.parse(ownerListResult.value);
            ownerList = ownerList.filter(i => i !== share.id);
            await this.storage.set(this.userKey('owner_list'), JSON.stringify(ownerList));
          }
        } else {
          await this.storage.set(share.id, JSON.stringify(share));
        }
        
        this._displayedShare = share;
        
        let contentHtml = '';
        
        if (share.content.text) {
          const downloadBtn = share.rules.downloadAllowed
            ? `<button class="btn btn-secondary btn-small" style="margin-top:0.75rem;" onclick="app.downloadText()">⬇️ Download Text</button>`
            : '';
          contentHtml += `
            <div class="section">
              <div class="section-title">Content</div>
              <div class="text-content">${this.escapeHtml(share.content.text)}</div>
              ${downloadBtn}
            </div>
          `;
        }
        
        if (share.content.file && share.content.file.data) {
          const file = share.content.file;
          const isImage = file.type && file.type.startsWith('image/');
          const downloadBtn = share.rules.downloadAllowed
            ? `<a href="${file.data}" download="${this.escapeHtml(file.name)}" class="btn btn-small" style="text-decoration:none;flex-shrink:0;">⬇️ Download</a>`
            : `<span style="color:#94a3b8;font-size:0.85rem;">Downloads disabled</span>`;
          const imagePreview = isImage
            ? `<img src="${file.data}" alt="${this.escapeHtml(file.name)}" class="image-preview">`
            : '';
          contentHtml += `
            <div class="section">
              <div class="section-title">Attached File</div>
              <div style="display:flex;align-items:center;gap:1rem;padding:1rem;background:rgba(255,255,255,0.05);border-radius:12px;flex-wrap:wrap;">
                <div style="font-size:2rem;">${isImage ? '🖼️' : '📄'}</div>
                <div style="flex:1;min-width:0;">
                  <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${this.escapeHtml(file.name)}</div>
                  <div style="font-size:0.85rem;color:#94a3b8;">${this.formatFileSize(file.size)}</div>
                </div>
                ${downloadBtn}
              </div>
              ${imagePreview}
            </div>
          `;
        }
        
        const selfDestructBanner = willSelfDestruct ? `
          <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:0.9rem;color:#fca5a5;">
            🔥 This was the last allowed view. The share has been permanently deleted.
          </div>
        ` : '';
        
        const viewsLabel = share.rules.maxViews !== -1
          ? `${share.stats.viewCount} / ${share.rules.maxViews} views`
          : `${share.stats.viewCount} view${share.stats.viewCount !== 1 ? 's' : ''}`;
        
        container.innerHTML = `
          <div class="card">
            ${selfDestructBanner}
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.5rem;">
              <div style="font-size:0.85rem;color:#94a3b8;">
                ${viewsLabel} · ${share.rules.passwordProtected ? '🔒 Protected' : '🔓 Public'}
              </div>
              <button class="btn btn-secondary btn-small" onclick="window.location.hash=''">🏠 Home</button>
            </div>
            ${contentHtml}
          </div>
        `;
      },
      
      downloadText() {
        const text = this._displayedShare && this._displayedShare.content.text;
        if (!text) return;
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'linklock-content.txt';
        a.click();
        URL.revokeObjectURL(url);
      },
      
      formatFileSize(bytes) {
        if (!bytes) return '—';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      },
      
      showToast(message) {
        let toast = document.getElementById('ll-toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.id = 'll-toast';
          toast.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(255,255,255,0.2);color:#e2e8f0;padding:0.75rem 1.5rem;border-radius:12px;font-size:0.9rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.3s;pointer-events:none;white-space:nowrap;';
          document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        clearTimeout(this._toastTimer);
        this._toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2200);
      },
      
      renderDashboard() {
        if (this.allShares.length === 0) {
          return `
            <div class="card">
              <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">👁️ Your Shares</h2>
              <div style="text-align: center; padding: 4rem 2rem;">
                <div style="font-size: 4rem; margin-bottom: 1rem; opacity: 0.5;">📦</div>
                <div style="font-size: 1.5rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.5rem;">No shares yet</div>
                <div style="color: #64748b; margin-bottom: 2rem;">Create your first smart share to get started</div>
                <button class="btn" style="max-width: 300px; margin: 0 auto;" onclick="app.setMode('upload')">📝 Create Share</button>
              </div>
            </div>
          `;
        }
        
        const sharesHtml = this.allShares.map(share => {
          const url = this.buildShareUrl(share.id, share);
          const isExpired = share.rules.expiryTime && Date.now() > share.rules.expiryTime;
          const isLimitReached = share.rules.maxViews !== -1 && share.stats.viewCount >= share.rules.maxViews;
          
          return `
            <div class="share-card">
              <div class="share-header">
                <div>
                  <div class="share-id">${share.id}${share.rules.passwordProtected ? ' 🔒' : ''}</div>
                  <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem;">
                    ${new Date(share.stats.createdAt).toLocaleString()}
                  </div>
                </div>
                <div class="share-actions">
                  <button class="btn btn-small btn-secondary" onclick="app.copyShareUrl('${url}')">📋</button>
                  <button class="btn btn-small btn-danger" onclick="app.deleteShare('${share.id}')">🗑️</button>
                </div>
              </div>
              
              <div style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                ${share.content.text ? this.escapeHtml(share.content.text.substring(0, 100)) : share.content.file ? this.escapeHtml(share.content.file.name) : ''}
              </div>
              
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                <div>
                  <div style="font-size: 0.8rem; color: #94a3b8;">Views</div>
                  <div style="color: ${isLimitReached ? '#ef4444' : '#3b82f6'}; font-weight: 600;">
                    ${share.stats.viewCount}${share.rules.maxViews !== -1 ? ' / ' + share.rules.maxViews : ''}
                  </div>
                </div>
                <div>
                  <div style="font-size: 0.8rem; color: #94a3b8;">Expires</div>
                  <div style="color: ${isExpired ? '#ef4444' : '#3b82f6'}; font-weight: 600; font-size: 0.85rem;">
                    ${share.rules.expiryTime
                      ? (isExpired ? 'Expired' : new Date(share.rules.expiryTime).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}))
                      : 'Never'}
                  </div>
                </div>
                <div>
                  <div style="font-size: 0.8rem; color: #94a3b8;">Download</div>
                  <div style="color: #3b82f6; font-weight: 600;">
                    ${share.rules.downloadAllowed ? '✓ Yes' : '✗ No'}
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        return `
          <div class="card">
            <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">👁️ Your Shares</h2>
            <div class="dashboard-grid">${sharesHtml}</div>
          </div>
        `;
      },
      
      togglePassword() {
        const field = document.getElementById('passwordField');
        const checked = document.getElementById('passwordProtected').checked;
        field.classList.toggle('hidden', !checked);
      },
      
      toggleCustomSlug() {
        const field = document.getElementById('customSlugField');
        const checked = document.getElementById('useCustomSlug').checked;
        field.classList.toggle('hidden', !checked);
      },
      
      handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) {
          this.fileData = null;
          this.fileReadPromise = null;
          this.render();
          return;
        }
        
        const reader = new FileReader();
        this.fileReadPromise = new Promise((resolve, reject) => {
          reader.onload = (e) => {
            this.fileData = {
              name: file.name,
              type: file.type,
              size: file.size,
              data: e.target.result
            };
            this.fileReadPromise = null;
            this.render();
            resolve();
          };
          reader.onerror = () => {
            this.fileData = null;
            this.fileReadPromise = null;
            this.render();
            reject(new Error('File read failed'));
          };
        });
        reader.readAsDataURL(file);
        this.render();
      },
      
      async createShare() {
        if (this.fileReadPromise) {
          try {
            await this.fileReadPromise;
          } catch (error) {
            alert('Failed to read the selected file. Please try again.');
            return;
          }
        }
        
        const textContent = document.getElementById('textContent').value;
        
        if (!textContent && !this.fileData) {
          alert('Please add some content to share');
          return;
        }
        
        const maxViews = document.getElementById('maxViews').value;
        const expiryHours = document.getElementById('expiryHours').value;
        const downloadAllowed = document.getElementById('downloadAllowed').checked;
        const passwordProtected = document.getElementById('passwordProtected').checked;
        const password = passwordProtected ? document.getElementById('password').value : '';
        const useCustomSlug = document.getElementById('useCustomSlug').checked;
        const customSlug = useCustomSlug ? document.getElementById('customSlug').value : '';
        
        if (passwordProtected && !password) {
          alert('Please set a password');
          return;
        }
        
        let id;
        if (useCustomSlug && customSlug) {
          if (!/^[a-zA-Z0-9-_]{3,30}$/.test(customSlug)) {
            alert('Invalid slug. Use 3-30 characters: letters, numbers, hyphens, underscores');
            return;
          }
          
          const existing = await this.storage.get(customSlug);
          if (existing && existing.value) {
            alert('This slug is already taken');
            return;
          }
          
          id = customSlug;
        } else {
          id = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }
        
        const now = Date.now();
        const expiryTime = expiryHours === 'never' ? null : now + (parseInt(expiryHours) * 60 * 60 * 1000);
        
        const contentObj = {
          id,
          content: {
            text: textContent,
            file: this.fileData
          },
          rules: {
            maxViews: maxViews === 'unlimited' ? -1 : parseInt(maxViews),
            expiryTime,
            downloadAllowed,
            passwordProtected,
            passwordHash: passwordProtected ? this.hashPassword(password) : null
          },
          stats: {
            viewCount: 0,
            createdAt: now,
            lastAccessed: null
          }
        };
        
        await this.storage.set(id, JSON.stringify(contentObj));
        
        const ownerListResult = await this.storage.get(this.userKey('owner_list'));
        const ownerList = ownerListResult && ownerListResult.value ? JSON.parse(ownerListResult.value) : [];
        ownerList.push(id);
        await this.storage.set(this.userKey('owner_list'), JSON.stringify(ownerList));
        
        this.shareUrl = this.buildShareUrl(id, contentObj);
        this.currentId = id;
        this.mode = 'share';
        this.render();
      },
      
      drawQR() {
        const qrContainer = document.getElementById('qrCanvas');
        if (!qrContainer || !this.shareUrl) return;
        
        qrContainer.innerHTML = '';
        
        if (window.QRCode) {
          try {
            new window.QRCode(qrContainer, {
              text: this.shareUrl,
              width: 320,
              height: 320,
              colorDark: '#000000',
              colorLight: '#FFFFFF',
              correctLevel: window.QRCode.CorrectLevel.Q
            });
            qrContainer.insertAdjacentHTML(
              'beforeend',
              '<div class="qr-help">Tip: keep full brightness and scan from ~15–25 cm for best results.</div>'
            );
          } catch (error) {
            qrContainer.innerHTML = '<div class="qr-fallback-message">Unable to generate QR code. Please shorten content and try again.</div>';
          }
          return;
        }
        
        qrContainer.innerHTML = '<div class="qr-fallback-message">Unable to generate QR code. Please refresh and try again.</div>';
      },
      
      async nativeShare() {
        if (!navigator.share) {
          alert('Native sharing is not supported on this browser.');
          return;
        }
        
        try {
          await navigator.share({
            title: 'LinkLock Share',
            text: 'Access my LinkLock share:',
            url: this.shareUrl
          });
        } catch (error) {
          if (error && error.name !== 'AbortError') {
            console.warn('Native share failed:', error);
          }
        }
      },
      
      downloadQR() {
        const qrContainer = document.getElementById('qrCanvas');
        const canvas = qrContainer ? qrContainer.querySelector('canvas') : null;
        const image = qrContainer ? qrContainer.querySelector('img') : null;
        const url = canvas ? canvas.toDataURL('image/png') : image ? image.src : null;
        if (!url) {
          alert('QR code is not ready yet.');
          return;
        }
        const a = document.createElement('a');
        a.href = url;
        a.download = 'linklock-' + this.currentId + '.png';
        a.click();
      },
      
      copyUrl() {
        navigator.clipboard.writeText(this.shareUrl).catch(() => {});
        this.showToast('✅ Link copied!');
      },
      
      copyShareUrl(url) {
        navigator.clipboard.writeText(url).catch(() => {});
        this.showToast('✅ Link copied!');
      },
      
      shareEmail() {
        const subject = encodeURIComponent('Shared content via LinkLock');
        const body = encodeURIComponent(`I've shared something with you using LinkLock:\n\n${this.shareUrl}\n\nThis link has controlled access and may expire.`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
      },
      
      async deleteShare(id) {
        if (!confirm('Delete this share?')) return;
        
        await this.storage.delete(id);
        
        const ownerListResult = await this.storage.get(this.userKey('owner_list'));
        if (ownerListResult && ownerListResult.value) {
          let ownerList = JSON.parse(ownerListResult.value);
          ownerList = ownerList.filter(shareId => shareId !== id);
          await this.storage.set(this.userKey('owner_list'), JSON.stringify(ownerList));
        }
        
        await this.loadDashboard();
      },
      
      reset() {
        this.fileData = null;
        this.fileReadPromise = null;
        this.mode = 'upload';
        window.location.hash = '';
        this.render();
      },
      
      escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }
    };
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      app.init();
    });
    
    // Handle hash changes
    window.addEventListener('hashchange', () => {
      app.init();
    });
  </script>
</body>
</html>
